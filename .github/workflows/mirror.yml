name: Mirror to GoFile

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'Link file yang mau di-mirror'
        required: true
        default: 'https://example.com/file.zip'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      - name: Download File
        run: |
          echo "📥 Downloading file..."
          curl -L "${{ github.event.inputs.file_url }}" -o file.zip

      - name: Get Best GoFile Server
        id: get_server
        run: |
          echo "🔍 Getting best GoFile server..."
          SERVER=$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[0].name')
          echo "SERVER=$SERVER" >> $GITHUB_ENV

      - name: Upload to GoFile
        id: upload
        run: |
          echo "📤 Uploading to GoFile server: $SERVER..."
          RESPONSE=$(curl -s -X POST \
            -F "file=@file.zip" \
            https://$SERVER.gofile.io/uploadFile)
          echo "Raw response: $RESPONSE"
          DOWNLOAD_URL=$(echo $RESPONSE | jq -r '.data.downloadPage')
          echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV

      - name: Show Result
        run: |
          echo "✅ File berhasil diupload ke GoFile:"
          echo "🔗 ${DOWNLOAD_URL}"
