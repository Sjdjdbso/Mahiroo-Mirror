name: Mirror

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'Link file yang mau di-mirror'
        required: true
        default: 'https://example.com/file.zip'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      - name: Download File
        run: |
          echo "📥 Downloading file..."
          curl -L "${{ github.event.inputs.file_url }}" -o file.zip

      - name: Upload to PixelDrain (Anonymous)
        id: upload
        run: |
          echo "📤 Uploading anonymously to PixelDrain..."
          RESPONSE=$(curl -s -X POST \
            -F "file=@file.zip" \
            https://pixeldrain.com/api/file)
          echo "Raw response: $RESPONSE"
          FILE_ID=$(echo $RESPONSE | jq -r '.id')
          echo "FILE_ID=$FILE_ID" >> $GITHUB_ENV
          echo "PixelDrain URL: https://pixeldrain.com/u/$FILE_ID"

      - name: Show Result
        run: |
          echo "✅ File berhasil diupload ke PixelDrain (Anonim):"
          echo "🔗 https://pixeldrain.com/u/${FILE_ID}"
